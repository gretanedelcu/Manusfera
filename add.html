<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Adaugă participant</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background-color: #111;
      background-image: linear-gradient(rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.62)), url("manusferabg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;

      display: inline-block;
      padding: 12px 20px;
      background: white;
      color: #111;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .back-button:hover {
      transform: translateY(-4px) scale(1.04);
      background: #e8e8e8;
    }

    .page {
      min-height: 100vh;
      padding: 80px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      margin-bottom: 30px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.7);
    }

    form {
      width: 100%;
      max-width: 440px;
      padding: 30px;
      background: rgba(0, 0, 0, 0.48);
      border-radius: 20px;
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    label {
      text-align: left;
      font-weight: bold;
      font-size: 15px;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #111;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      background: #e8e8e8;
    }

    .note {
      max-width: 440px;
      margin-top: 18px;
      color: #cfcfcf;
      font-size: 14px;
      font-style: italic;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <a class="back-button" href="particip.html">Înapoi</a>

  <main class="page">
    <h1>Adaugă participant</h1>

    <form id="participantForm">
      <div>
        <label for="imageInput">Poză profil</label>
        <input id="imageInput" type="file" accept="image/*" required>
      </div>

      <div>
        <label for="titleInput">Titlu</label>
        <input id="titleInput" type="text" placeholder="Ex: ANDREI" required>
      </div>

      <div>
        <label for="subtitleInput">Subtitlu</label>
        <textarea id="subtitleInput" placeholder="Ex: Renunță la sucuri." required></textarea>
      </div>

      <button type="submit">Adaugă în listă</button>
    </form>

    <p class="note">
      Participanții adăugați se salvează local, doar în browserul tău.
    </p>
  </main>

  <script>
    const form = document.getElementById("participantForm");
    const imageInput = document.getElementById("imageInput");
    const titleInput = document.getElementById("titleInput");
    const subtitleInput = document.getElementById("subtitleInput");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      const file = imageInput.files[0];

      if (!file) {
        alert("Te rog să alegi o imagine.");
        return;
      }

      const reader = new FileReader();

      reader.onload = function() {
        const newParticipant = {
          image: reader.result,
          title: titleInput.value.trim(),
          subtitle: subtitleInput.value.trim()
        };

        const savedParticipants = JSON.parse(localStorage.getItem("manusferaParticipants") || "[]");

        savedParticipants.push(newParticipant);

        localStorage.setItem("manusferaParticipants", JSON.stringify(savedParticipants));

        window.location.href = "particip.html";
      };

      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
