<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Alătură-te mișcării</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background-color: #111;
      background-image: linear-gradient(rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.62)), url("manusferabg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      min-height: 100vh;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;

      display: inline-block;
      padding: 12px 20px;
      background: white;
      color: #111;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;

      transition: transform 0.25s ease, background 0.25s ease;
    }

    .back-button:hover {
      transform: translateY(-4px) scale(1.04);
      background: #e8e8e8;
    }

    .page {
      min-height: 100vh;
      padding: 80px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      margin-bottom: 12px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.7);
    }

    .intro {
      max-width: 520px;
      margin-bottom: 30px;
      color: #d0d0d0;
      font-size: 17px;
      line-height: 1.5;
      font-style: italic;
    }

    form {
      width: 100%;
      max-width: 460px;
      padding: 30px;
      background: rgba(0, 0, 0, 0.48);
      border-radius: 20px;
      backdrop-filter: blur(8px);

      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group {
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 15px;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #111;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;

      transition: transform 0.25s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      background: #e8e8e8;
    }

    .note {
      max-width: 460px;
      margin-top: 18px;
      color: #cfcfcf;
      font-size: 14px;
      font-style: italic;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <a class="back-button" href="particip.html">Înapoi</a>

  <main class="page">
    <h1>Alătură-te mișcării</h1>

    <p class="intro">
      Completează poza, titlul și subtitlul. Informațiile vor fi trimise pe email pentru aprobare.
    </p>

    <form action="https://formsubmit.co/gabriel.vilea96@gmail.com" method="POST" enctype="multipart/form-data">

      <input type="hidden" name="_subject" value="Participant nou - Manusfera">
      <input type="hidden" name="_template" value="table">

      <div class="form-group">
        <label for="email">Emailul tău</label>
        <input id="email" type="email" name="email" placeholder="exemplu@email.com" required>
      </div>

      <div class="form-group">
        <label for="title">Titlu / Nume</label>
        <input id="title" type="text" name="Titlu" placeholder="Ex: ANDREI" required>
      </div>

      <div class="form-group">
        <label for="subtitle">Subtitlu</label>
        <textarea id="subtitle" name="Subtitlu" placeholder="Ex: Renunță la dulciuri." required></textarea>
      </div>

      <div class="form-group">
        <label for="attachment">Poză profil</label>
        <input id="attachment" type="file" name="attachment" accept="image/png, image/jpeg, image/webp" required>
      </div>

      <button type="submit">Trimite participarea</button>
    </form>

    <p class="note">
      Prima trimitere poate cere confirmarea adresei de email. După confirmare, următoarele participări vor ajunge direct pe email.
    </p>
  </main>
</body>
</html>
